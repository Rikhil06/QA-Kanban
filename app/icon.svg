<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#6B8EF0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <rect x="60" y="60" width="960" height="960" rx="260" ry="260"
        fill="none" stroke="#5B4BC4" stroke-width="28" opacity="0.7" filter="url(#glow)"/>

  <!-- Main rounded square background -->
  <rect x="88" y="88" width="904" height="904" rx="230" ry="230"
        fill="url(#bg)"/>


  <!-- Checkbox rounded square outline -->
  <rect x="270" y="270" width="540" height="540" rx="90" ry="90"
        fill="none" stroke="white" stroke-width="62" stroke-linejoin="round"/>

  <!-- Checkmark -->
  <polyline points="360,560 490,690 720,420"
            fill="none" stroke="white" stroke-width="70"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
